openapi: 3.0.3
info:
  title: Sentiment Search API
  version: 1.0.0
  description: Core API for handling user searches and delegating tracking tasks.

paths:
  /api/tickers/sentiment:
    get:
      summary: Stream ticker sentiment as NDJSON. Accepts either a search query or a list of ticker IDs.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search query (company name, sector). Mutually exclusive with tickerIds.
        - in: query
          name: tickerIds
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Repeat the param (?tickerIds=AAPL&tickerIds=MSFT). Mutually exclusive with q.
      responses:
        "200":
          description: NDJSON stream of analyzed ticker results (one TickerResult per line, or a SearchError line).
          content:
            application/x-ndjson:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TickerResult"
                  - $ref: "#/components/schemas/SearchError"
      tags:
        - webclient-out
        - core-in

  /api/tickers/trending:
    get:
      summary: Get the current trending US tickers
      responses:
        "200":
          description: List of trending stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"
      tags:
        - webclient-out
        - core-in

  /api/tickers/{tickerId}/sentiment:
    get:
      summary: Stream sentiment for a single ticker as NDJSON. Optionally pin to one or more event timestamps.
      parameters:
        - in: path
          name: tickerId
          required: true
          schema:
            type: string
          description: Ticker symbol (e.g. AAPL)
        - in: query
          name: eventTSec
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Optional. Per-event timestamps (Unix seconds). Repeat the param. Each produces one TickerResult line.
        - in: query
          name: intervalSec
          schema:
            type: integer
            minimum: 1
          description: Optional. Article-window size in seconds (fromSec = eventTSec - intervalSec, or now - intervalSec for no-event call).
      responses:
        "200":
          description: NDJSON stream — one TickerResult per line (one per eventTSec, or a single result when no events given).
          content:
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/TickerResult"
        "503":
          description: Sentiment data unavailable
      tags:
        - webclient-out
        - core-in

  /api/tickers/{tickerId}/candles:
    get:
      summary: Get OHLC price candles for a ticker
      parameters:
        - in: path
          name: tickerId
          required: true
          schema:
            type: string
          description: Ticker symbol (e.g. AAPL)
        - in: query
          name: duration
          required: true
          schema:
            type: string
            enum: [1D, 1W, 1M, 1Y, today]
          description: Lookback window. `today` starts at UTC midnight; others go back from now.
        - in: query
          name: interval
          required: true
          schema:
            type: string
            enum: [5m, 30m, 1d]
          description: Candle interval.
      responses:
        "200":
          description: OHLC candle series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleSeries"
        "503":
          description: Price data unavailable
      tags:
        - webclient-out
        - core-in

  /api/tickers/{tickerId}/peers:
    get:
      summary: Get peer companies for a ticker
      parameters:
        - in: path
          name: tickerId
          required: true
          schema:
            type: string
          description: Ticker symbol to find peers for (e.g. AAPL)
      responses:
        "200":
          description: List of peer stocks (same country + sector/industry)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"
      tags:
        - webclient-out
        - core-in

  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Username already taken
      tags:
        - webclient-out
        - core-in

  /api/auth/login:
    post:
      summary: Login to an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
      tags:
        - webclient-out
        - core-in

  /api/lists:
    get:
      summary: Get all user lists with their items
      responses:
        "200":
          description: The user's lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/List"
        "401":
          description: Unauthorized
      tags:
        - webclient-out
        - core-in
    post:
      summary: Create a new list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListRequest"
      responses:
        "200":
          description: Created list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"
        "401":
          description: Unauthorized
      tags:
        - webclient-out
        - core-in

  /api/lists/{id}:
    patch:
      summary: Rename a list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameListRequest"
      responses:
        "200":
          description: Renamed list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSummary"
        "401":
          description: Unauthorized
        "404":
          description: List not found
      tags:
        - webclient-out
        - core-in
    delete:
      summary: Delete a list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "401":
          description: Unauthorized
      tags:
        - webclient-out
        - core-in

  /api/lists/{id}/items:
    post:
      summary: Add a ticker to a list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddListItemRequest"
      responses:
        "200":
          description: Added
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
      tags:
        - webclient-out
        - core-in

  /api/lists/{id}/items/{ticker}:
    delete:
      summary: Remove a ticker from a list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: ticker
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
      tags:
        - webclient-out
        - core-in

  /api/lists/stream:
    get:
      summary: Stream sentiment updates for user's watchlist tickers (SSE)
      description: >
        Server-Sent Events stream. Each `data:` line is a JSON-encoded
        `SentimentStreamEvent`. The client is responsible for deciding whether
        a score change warrants an alert. Pass the JWT via the `token` query
        parameter when using the browser `EventSource` API (which cannot set
        custom headers).
      parameters:
        - in: query
          name: token
          schema:
            type: string
          description: JWT token (alternative to Authorization header, required for EventSource)
      responses:
        "200":
          description: SSE stream of sentiment update events (use EventSource, not fetch)
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
      tags:
        - webclient-out
        - core-in

components:
  schemas:
    Stock:
      $ref: "./schemas/Stock.json"

    TickerResult:
      $ref: "./schemas/TickerResult.json"

    Candle:
      $ref: "./schemas/Candle.json"

    SourceResult:
      $ref: "./schemas/SourceResult.json"

    SearchError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CandleSeries:
      type: object
      required: [ticker, interval, candles]
      properties:
        ticker:
          type: string
        interval:
          type: string
          enum: [5m, 30m, 1d]
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    AuthRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    ListItem:
      type: object
      properties:
        ticker:
          type: string
      required:
        - ticker

    List:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ListItem"
      required:
        - id
        - name
        - items

    ListSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    CreateListRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    RenameListRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    AddListItemRequest:
      type: object
      properties:
        ticker:
          type: string
      required:
        - ticker

    SentimentStreamEvent:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum: [connected]
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              enum: [TICKER_UPDATE]
            payload:
              $ref: "#/components/schemas/TickerResult"
          required:
            - type
            - payload
