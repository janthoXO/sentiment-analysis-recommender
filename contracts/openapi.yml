openapi: 3.0.3
info:
  title: Sentiment Search API
  version: 1.0.0
  description: Core API for handling user searches and delegating tracking tasks.

paths:
  # ---------------------------------------------------------
  # PUBLIC FACING: React Webclient -> Core Server
  # ---------------------------------------------------------
  /api/search:
    get:
      summary: Search for a stock's sentiment (ndJSON Stream)
      parameters:
        - in: query
          name: query
          schema:
            type: string
          required: true
          description: The stock name or topic to search.
      responses:
        "200":
          description: A stream of analyzed stock results.
          content:
            application/x-ndjson:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueryResult"
                  - $ref: "#/components/schemas/SearchError"
      tags:
        - webclient-out
        - core-in

  # ---------------------------------------------------------
  # INTERNAL ONLY: Core Server -> Tracking Service
  # ---------------------------------------------------------
  /internal/track:
    post:
      summary: Command the Tracking Service to track a stock.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackRequest"
      responses:
        "200":
          description: Successfully initiated scrape and counted articles.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TrackResponse"
                nullable: true
      tags:
        - trends-out
        - core-out
        - tracker-in

components:
  schemas:
    QueryResult:
      $ref: "./schemas/QueryResult.json"
    
    # You can also do this for your error object to make it even cleaner!
    SearchError:
      type: object
      properties:
        error:
          type: string
    
    TrackRequest:
      $ref: "./schemas/TrackRequest.json"

    TrackResponse:
      $ref: "./schemas/TrackResponse.json"