openapi: 3.0.3
info:
  title: Sentiment Search API
  version: 1.0.0
  description: Core API for handling user searches and delegating tracking tasks.

paths:
  /api/search:
    get:
      summary: Search for stock sentiment (ndJSON Stream)
      parameters:
        - in: query
          name: topic
          schema:
            type: string
          description: The topic to search.
        - in: query
          name: tickers
          schema:
            type: string
          description: List of stock tickers to analyze.
      responses:
        "200":
          description: A stream of analyzed stock results.
          content:
            application/x-ndjson:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TickerResult"
                  - $ref: "#/components/schemas/SearchError"
      tags:
        - webclient-out
        - core-in

components:
  schemas:
    TickerResult:
      $ref: "./schemas/TickerResult.json"

    SearchError:
      type: object
      properties:
        error:
          type: string
