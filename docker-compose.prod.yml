services:
  reverse-proxy:
    image: traefik:v3.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=test@test.de"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt

  core:
    image: ghcr.io/janthoxo/sentiment-analysis-recommender/core:latest
    environment:
      PORT: 3001
      CACHE_URL: redis://default:${REDIS_PASSWORD}@core-redis:6379
      DB_URL: postgresql://${CORE_DB_USER}:${CORE_DB_PASSWORD}@core-postgres:5432/sentinel
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      core-postgres:
        condition: service_healthy
      core-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sentinel-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.services.server.loadbalancer.server.port=3001"
      - "traefik.http.routers.server.entrypoints=websecure"
      - "traefik.http.routers.server.tls.certresolver=letsencrypt"

  webclient:
    image: ghcr.io/janthoxo/sentiment-analysis-recommender/webclient:latest
    environment:
      - API_URL=http://core:3001/api/
    depends_on:
      - core
    networks:
      - sentinel-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`${DOMAIN}`)"
      - "traefik.http.services.client.loadbalancer.server.port=80"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.client-compress.compress=true"
      - "traefik.http.routers.client.middlewares=client-compress"

  test-analyzer:
    image: ghcr.io/janthoxo/sentiment-analysis-recommender/testanalyzer:latest
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sentinel-net

  core-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
      POSTGRES_DB: sentinel
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-redis:
    image: redis:8.6.2-alpine
    container_name: core-redis
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    expose:
      - "6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3-management-alpine
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

volumes:
  pgdata:
  rmqdata:

networks:
  sentinel-net:
    driver: bridge
