name: Unified Release

on:
  push:
    branches:
      - main
    # The workflow itself only triggers if one of these folders (or the workflow itself) changes
    paths:
      - "webclient/**"
      - "core/**"
      - "test-analyzer/**"
      - "analyzer/**"
      - ".github/workflows/**"

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine Version
        id: version
        uses: ./.github/actions/determine-version

  # 1. NEW JOB: Detect which paths actually changed since the last release
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      webclient: ${{ steps.filter.outputs.webclient }}
      core: ${{ steps.filter.outputs.core }}
      test-analyzer: ${{ steps.filter.outputs.test-analyzer }}
      analyzer: ${{ steps.filter.outputs.analyzer }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Detect changes since last release
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            echo "No previous release found — building all services"
            echo "webclient=true" >> $GITHUB_OUTPUT
            echo "core=true" >> $GITHUB_OUTPUT
            echo "test-analyzer=true" >> $GITHUB_OUTPUT
            echo "analyzer=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing against $LATEST"
          CHANGED=$(git diff --name-only "$LATEST" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          check() {
            echo "$CHANGED" | grep -qE "$1" && echo "true" || echo "false"
          }

          echo "webclient=$(check '^webclient/|^\.github/workflows/(build|package)\.webclient\.yml')" >> $GITHUB_OUTPUT
          echo "core=$(check '^core/|^\.github/workflows/(build|package)\.core\.yml')" >> $GITHUB_OUTPUT
          echo "test-analyzer=$(check '^test-analyzer/|^\.github/workflows/(build|package)\.testanalyzer\.yml')" >> $GITHUB_OUTPUT
          echo "analyzer=$(check '^analyzer/|^\.github/workflows/(build|package)\.analyzer\.yml')" >> $GITHUB_OUTPUT

  # 2. Add 'if' conditions to the package jobs
  package-webclient:
    needs: [ versioning, detect-changes ]
    if: ${{ needs.detect-changes.outputs.webclient == 'true' }}
    uses: ./.github/workflows/package.webclient.yml
    with:
      version: ${{ needs.versioning.outputs.version }}

  package-core:
    needs: [ versioning, detect-changes ]
    if: ${{ needs.detect-changes.outputs.core == 'true' }}
    uses: ./.github/workflows/package.core.yml
    with:
      version: ${{ needs.versioning.outputs.version }}

  package-test-analyzer:
    needs: [ versioning, detect-changes ]
    if: ${{ needs.detect-changes.outputs.test-analyzer == 'true' }}
    uses: ./.github/workflows/package.testanalyzer.yml
    with:
      version: ${{ needs.versioning.outputs.version }}

  package-analyzer:
    needs: [ versioning, detect-changes ]
    if: ${{ needs.detect-changes.outputs.analyzer == 'true' }}
    uses: ./.github/workflows/package.analyzer.yml
    with:
      version: ${{ needs.versioning.outputs.version }}

  # 3. Update the release job to run even if some packaging jobs were skipped
  release:
    needs: [ versioning, package-webclient, package-core, package-test-analyzer, package-analyzer ]
    # Run as long as the workflow wasn't cancelled and no previous jobs failed
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifacts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, Tag, and Push All Images
        run: |
          VERSION=${{ needs.versioning.outputs.version }}
          
          # This loop naturally adapts. If only 'core' was built, only the core .tar will exist here.
          find ./artifacts -type f -name "*.tar" | while read -r tar_file; do
            echo "Processing $tar_file..."
            
            docker load -i "$tar_file"
            
            FILENAME=$(basename "$tar_file")
            SERVICE_NAME=$(echo "$FILENAME" | cut -d'-' -f1)
            
            IMAGE_ID=ghcr.io/${{ github.repository }}/$SERVICE_NAME
            IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
            
            docker tag $SERVICE_NAME:$VERSION $IMAGE_ID:$VERSION
            docker tag $SERVICE_NAME:$VERSION $IMAGE_ID:latest
            
            docker push $IMAGE_ID:$VERSION
            docker push $IMAGE_ID:latest
          done

      - name: Create Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.versioning.outputs.version }}
          name: Release v${{ needs.versioning.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
